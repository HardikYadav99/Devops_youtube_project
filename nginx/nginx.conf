#simple reverse proxy 
# serves frontend at /
#proxies /api/* to backend service 
# set headers so that backend can see orignal host and client API


events{}

http {

    client_max_body_size 10M;

    server {
        listen 80;
 # location / -> when someone visits the / (Home page ) take him to http://frontend:5173
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;                 # it tells to backend from what domain request is coming for example: http://coolman.com if not host backend sees http://api/5001
        proxy_set_header X-Real-IP $remote_addr;     # it will forward the orignal IP of the user, if not applied we get ngnix internal IP
        proxy_set_header X-Forwarded_Proto $scheme;  # it will forward the original protocol 
        proxy_buffering off;                         # it keeps the buffering off for devs, if dev wanna see any kind of log they can see it instantly.     
    }

# location /api -> when some demands something, which require backend that means it will have /api in the end so it will be forwarded here.
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded_Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }


    location = /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
  }

}