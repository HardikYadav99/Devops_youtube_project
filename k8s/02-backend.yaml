apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mern-project
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels: 
        app: backend
    spec:
      containers:
        - name: backend
          image: backend:local
          imagePullPolicy: IfNotPresent
          ports: 
            - containerPort: 5000
          env: 
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_URI
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              # MISTAKE 1: These two lines were pulled too far to the left. 
              # They belong *inside* httpGet, so they need to be indented by two spaces.
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mern-project
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  # MISTAKE 2: 'type' was indented too far to the right! 
  # You accidentally put it inside the 'ports' list. It needs to be a sibling of 'ports'.
  type: ClusterIP